<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>GBP Content Calendar Generator</title>

<!-- React -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>

<!-- Stable PPTX library -->
<script src="https://unpkg.com/pptxgenjs/dist/pptxgen.bundle.js"></script>

<style>
body{background:#0c1610;font-family:Georgia,serif;color:#e8f0e8;margin:0}
.container{max-width:900px;margin:auto;padding:40px}
.card{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);padding:25px;border-radius:14px}
input,textarea,select{width:100%;padding:12px;border-radius:8px;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.08);color:white;margin-bottom:14px;font-family:Georgia,serif}
button{padding:12px 20px;border:none;border-radius:8px;background:#2d6a4f;color:white;font-weight:bold;cursor:pointer}
.post{background:rgba(255,255,255,.04);padding:15px;border-radius:10px;margin-top:10px}
</style>
</head>

<body>
<div id="root"></div>

<script type="text/babel">

const MONTHS=["January","February","March","April","May","June","July","August","September","October","November","December"]

function generatePosts(biz,month,year){

const themes=[
"Brand introduction",
"Product or service highlight",
"Customer tip",
"Behind the scenes",
"Customer testimonial",
"Seasonal promotion",
"Industry myth busting",
"Visit or contact CTA"
]

let posts=[]

for(let i=0;i<8;i++){
posts.push({
week:`Week ${Math.floor(i/2)+1}`,
date:`${MONTHS[month]} ${(i*3)+2}`,
theme:themes[i],
caption:`${biz.name} — ${themes[i]}. Discover what makes us different. Contact us today to learn more about our services and how we help customers every day.` ,
ai:`photorealistic image representing ${themes[i]} for ${biz.name}`
})
}

return posts
}

async function downloadPPT(biz,posts,month,year){

const pptx=new PptxGenJS()

pptx.layout="LAYOUT_WIDE"

let cover=pptx.addSlide()

cover.background={color:"2d6a4f"}

cover.addText(biz.name,{x:1,y:1,fontSize:36,bold:true,color:"FFFFFF"})
cover.addText(`${MONTHS[month]} ${year} Google Business Profile Content Calendar`,{x:1,y:2,fontSize:16,color:"FFFFFF"})

let summary=pptx.addSlide()

summary.addText("Content Overview",{x:0.5,y:0.4,fontSize:24,bold:true})

posts.forEach((p,i)=>{
summary.addText(`${i+1}. ${p.date} - ${p.theme}`,{x:0.7,y:1+(i*.4),fontSize:12})
})

posts.forEach((p,i)=>{

let s=pptx.addSlide()

s.addText(`${biz.name} | ${p.week}`,{x:0.5,y:0.3,fontSize:18,bold:true})

s.addText(`Post ${i+1} - ${p.date}`,{x:0.5,y:0.8,fontSize:14})

s.addText("Caption",{x:0.5,y:1.4,fontSize:14,bold:true})

s.addText(p.caption,{x:0.5,y:1.8,w:6,fontSize:12})

s.addText("AI Image Prompt",{x:7,y:1.4,fontSize:14,bold:true})

s.addText(p.ai,{x:7,y:1.8,w:5,fontSize:12,italic:true})

})

await pptx.writeFile(`${biz.name.replace(/[^a-z0-9]/gi,"_")}_${MONTHS[month]}_${year}_GBP_Content.pptx`)
}

function App(){

const[name,setName]=React.useState("")
const[details,setDetails]=React.useState("")
const[month,setMonth]=React.useState(new Date().getMonth())
const[year,setYear]=React.useState(new Date().getFullYear())
const[posts,setPosts]=React.useState(null)

function generate(){

if(!name||!details){
alert("Fill business name and details")
return
}

const biz={name,details}

setPosts(generatePosts(biz,month,year))
}

if(posts){
return(
<div className="container">
<div className="card">
<h2>{name} — Generated Posts</h2>
<button onClick={()=>downloadPPT({name,details},posts,month,year)} style={{marginBottom:20}}>Download PPTX</button>

{posts.map((p,i)=>(
<div className="post" key={i}>
<b>{p.week} — {p.date}</b>
<p><b>Theme:</b> {p.theme}</p>
<p>{p.caption}</p>
<p style={{fontStyle:"italic"}}>AI Prompt: {p.ai}</p>
</div>
))}

<button onClick={()=>setPosts(null)}>Back</button>

</div>
</div>
)
}

return(
<div className="container">
<div className="card">
<h2>GBP Content Calendar Generator</h2>

<input placeholder="Business name" value={name} onChange={e=>setName(e.target.value)} />

<textarea rows="4" placeholder="Business details" value={details} onChange={e=>setDetails(e.target.value)} />

<select value={month} onChange={e=>setMonth(parseInt(e.target.value))}>
{MONTHS.map((m,i)=>(<option value={i} key={i}>{m}</option>))}
</select>

<input type="number" value={year} onChange={e=>setYear(e.target.value)} />

<button onClick={generate}>Generate Content</button>

</div>
</div>
)
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>)

</script>

</body>
</html>
